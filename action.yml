name: ROS Graph Regression Diff
description: Render a ros_graph_debugger before/after graph diff and comment on pull requests.

inputs:
  baseline:
    description: Path to the baseline .rgd.json recording.
    required: true
  candidate:
    description: Path to the candidate .rgd.json recording.
    required: true
  github-token:
    description: GitHub token used to comment on pull requests.
    required: true

runs:
  using: composite
  steps:
    - name: Install ros_graph_debugger image extras
      shell: bash
      run: python -m pip install -e ".[image]"

    - name: Build graph diff
      id: diff
      shell: bash
      run: |
        set +e
        python -m ros_graph_debugger.cli diff \
          "${{ inputs.baseline }}" \
          "${{ inputs.candidate }}" \
          --image rgd-diff.svg \
          --fail-on-regression > rgd-diff.md
        status=$?
        {
          echo "## ROS Graph Regression Diff"
          echo
          cat rgd-diff.md
          echo
          echo "[Graph diff artifact](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
        } >> "$GITHUB_STEP_SUMMARY"
        echo "status=$status" >> "$GITHUB_OUTPUT"
        exit 0

    - name: Upload graph diff artifact
      uses: actions/upload-artifact@v4
      with:
        name: ros-graph-diff
        path: |
          rgd-diff.svg
          rgd-diff.md

    - name: Comment on pull request
      if: ${{ github.event_name == 'pull_request' }}
      uses: actions/github-script@v7
      continue-on-error: true
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const fs = require('fs');
          const md = fs.readFileSync('rgd-diff.md', 'utf8');
          const artifactUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.payload.pull_request.number,
            body: `${md}\n\n[Download graph diff image artifact](${artifactUrl})`
          });

    - name: Fail on regression
      shell: bash
      run: exit "${{ steps.diff.outputs.status }}"
