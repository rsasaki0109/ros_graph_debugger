<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ROS Graph Debugger</title>
  <link rel="stylesheet" href="/style.css" />
  <script src="/vendor/cytoscape.min.js"></script>
  <script src="/vendor/dagre.min.js"></script>
  <script src="/vendor/cytoscape-dagre.min.js"></script>
</head>
<body>
  <header id="topbar">
    <div class="brand">
      <span class="logo">◇</span>
      <span class="title">ROS Graph Debugger</span>
      <span class="tagline">Runtime DevTools for ROS&nbsp;2</span>
    </div>
    <div class="viewtabs">
      <button class="viewtab active" data-view="graph">Graph</button>
      <button class="viewtab hidden" data-view="fleet" id="fleet-viewtab">Fleet</button>
      <button class="viewtab" data-view="network">Network</button>
      <button class="viewtab" data-view="tf">TF</button>
      <button class="viewtab" data-view="diag">Diagnostics</button>
    </div>
    <div class="status">
      <span id="health-chip" class="chip hidden"></span>
      <span id="profile-chip" class="chip hidden"></span>
      <span id="conn" class="chip conn-off">connecting…</span>
      <span id="counts" class="chip"></span>
      <button id="pause-btn" class="btn">⏸ Pause</button>
      <button id="fit-btn" class="btn">⤢ Fit</button>
      <button id="flow-btn" class="btn active" title="animate data flow on the graph" onclick="window._toggleFlow(this)">✨ Flow</button>
      <button id="cinema-btn" class="btn" title="replay the incident with camera moves and captions" disabled>▶ Cinema</button>
      <button id="export-webm" class="btn" title="record one cinema pass as WebM" disabled>⤓ WebM</button>
      <button id="export-json" class="btn" title="download the current snapshot as JSON">⤓ JSON</button>
      <button id="export-md" class="btn" title="download the AI briefing as Markdown">⤓ MD</button>
      <a id="ai-md-link" class="btn" href="/api/v1/snapshot.md" target="_blank">⧉ AI&nbsp;Markdown</a>
    </div>
  </header>

  <div id="readiness" style="display:none"></div>

  <main>
    <section id="graph-pane">
      <div id="cy"></div>
      <div id="fleet-drilldown" class="hidden">
        <span id="fleet-drilldown-label"></span>
        <button id="fleet-back" class="btn">← Fleet</button>
      </div>
      <div id="cinema-caption" class="hidden"></div>
      <div id="stage-legend" class="hidden"></div>
      <div id="legend" class="status-legend">
        <span><i class="dot ok"></i>ok</span>
        <span><i class="dot warning"></i>warning</span>
        <span><i class="dot critical"></i>critical</span>
        <span><i class="dot unknown"></i>unknown</span>
      </div>
    </section>

    <section id="fleet-pane" class="hidden">
      <div id="fleet-grid"></div>
    </section>

    <section id="network-pane" class="hidden">
      <div class="net-toolbar">
        <input id="net-filter" type="text" placeholder="filter topics by name or type…" />
        <span id="net-count" class="chip"></span>
      </div>
      <div class="net-table-wrap">
        <table id="net-table">
          <thead><tr id="net-head"></tr></thead>
          <tbody id="net-body"></tbody>
        </table>
      </div>
    </section>

    <section id="tf-pane" class="hidden">
      <div class="net-toolbar">
        <input id="tf-filter" type="text" placeholder="filter frames…" />
        <span id="tf-count" class="chip"></span>
        <span class="tf-legend"><i class="dot ok"></i>fresh <i class="dot warning"></i>stale <i class="dot static"></i>static</span>
      </div>
      <div id="tf-tree" class="tf-tree-wrap"></div>
    </section>

    <section id="diag-pane" class="hidden">
      <div class="net-toolbar">
        <input id="diag-filter" type="text" placeholder="filter by name / message / hardware_id…" />
        <span id="diag-count" class="chip"></span>
      </div>
      <div id="diag-list" class="diag-wrap"></div>
    </section>

    <aside id="side">
      <nav id="tabs">
        <button class="tab active" data-tab="issues">Issues <span id="issue-badge" class="badge">0</span></button>
        <button class="tab" data-tab="detail">Inspector</button>
        <button class="tab hidden" id="tab-settings-btn" data-tab="settings">Settings</button>
      </nav>
      <div id="tab-issues" class="tab-body active"></div>
      <div id="tab-detail" class="tab-body">
        <p class="hint">Click a node or topic in the graph to inspect it.</p>
      </div>
      <div id="tab-settings" class="tab-body"></div>
    </aside>
  </main>

  <footer id="replaybar" class="hidden">
    <span class="chip replay-chip">▶ REPLAY</span>
    <button id="rp-play" class="btn" data-playing="true">⏸ Pause</button>
    <input id="rp-seek" type="range" min="0" max="0" value="0" />
    <span id="rp-frame" class="chip">0 / 0</span>
  </footer>

  <script src="/app.js"></script>
</body>
</html>
