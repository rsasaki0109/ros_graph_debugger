name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-test:
    name: build & test (ROS 2 ${{ matrix.ros_distro }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ros_distro: [humble, jazzy]
    container:
      image: ros:${{ matrix.ros_distro }}-ros-base
    steps:
      - uses: actions/checkout@v4

      - name: Install build & runtime dependencies
        shell: bash
        run: |
          set -e
          apt-get update
          apt-get install -y --no-install-recommends \
            python3-pip python3-colcon-common-extensions \
            ros-${{ matrix.ros_distro }}-std-msgs \
            ros-${{ matrix.ros_distro }}-tf2-msgs \
            ros-${{ matrix.ros_distro }}-diagnostic-msgs \
            ros-${{ matrix.ros_distro }}-statistics-msgs
          # Web/API stack is pip-only. --break-system-packages is unknown to the
          # older pip on 22.04 (humble) and required on 24.04 (jazzy), so try it
          # then fall back. No -U: it would try to uninstall debian-managed
          # packages (e.g. PyYAML) which have no RECORD file.
          pip_install() { pip3 install --break-system-packages "$@" || pip3 install "$@"; }
          pip_install fastapi uvicorn websockets pydantic psutil pyyaml
          # fastapi pulls a modern anyio whose pytest plugin needs pytest>=7;
          # 22.04 ships 6.2.5. Install a newer one alongside (--ignore-installed
          # avoids touching the debian-managed copy) only when too old.
          python3 -c "import pytest,sys;sys.exit(0 if int(pytest.__version__.split('.')[0])>=7 else 1)" \
            || pip_install --ignore-installed "pytest>=7,<9"

      - name: colcon build
        shell: bash
        run: |
          source /opt/ros/${{ matrix.ros_distro }}/setup.bash
          colcon build --packages-select ros_graph_debugger

      - name: pytest
        shell: bash
        run: |
          source /opt/ros/${{ matrix.ros_distro }}/setup.bash
          source install/setup.bash
          python3 -m pytest test/ -v

  web-check:
    name: web assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: JS syntax check
        run: node --check ros_graph_debugger/web/app.js
      - name: Verify vendored libraries are real JS (not error pages)
        shell: bash
        run: |
          for f in ros_graph_debugger/web/vendor/*.js; do
            head -c 200 "$f" | grep -qiE 'cytoscape|dagre|module|function' \
              && echo "ok: $f" || { echo "suspect: $f"; exit 1; }
          done
